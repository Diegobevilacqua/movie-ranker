openapi: 3.1.0
info:
  title: Movie Ranker — List liked movies
  version: 0.1.0
paths:
  /users/{userId}/likes:
    get:
      summary: List liked movie ids for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Envelope; data contains movieIds sorted ascending
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      movieIds:
                        type: array
                        items: { type: string }
                  error: { nullable: true }
        "404":
          description: User not found; error envelope
